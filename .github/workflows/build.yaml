name: PyInstaller Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests toml

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --icon=./icons/icon.icns Embracedata_Downloader.py

      - name: Rename binary (Linux/macOS)
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            mv dist/Embracedata_Downloader dist/Embracedata_Downloader-linux
            chmod +x dist/Embracedata_Downloader-linux
          else
            mv dist/Embracedata_Downloader dist/Embracedata_Downloader-macos
            chmod +x dist/Embracedata_Downloader-macos
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Embracedata_Downloader-${{ matrix.os }}
          path: dist/Embracedata_Downloader*

  build-windows:

    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests toml

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --icon=./icons/icon.ico Embracedata_Downloader.py

      - name: Rename binary
        run: |
          ren dist\Embracedata_Downloader.exe Embracedata_Downloader-windows.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Embracedata_Downloader-windows
          path: dist/Embracedata_Downloader-windows.exe

  release:

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: [build, build-windows]

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toml
        run: |
          python -m pip install --upgrade pip
          pip install toml

      - name: Extract version from pyproject.toml
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['tool']['poetry']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Embracedata_Downloader-ubuntu-latest
          path: artifacts/linux

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: Embracedata_Downloader-macos-latest
          path: artifacts/macos

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Embracedata_Downloader-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/linux/Embracedata_Downloader-linux
            artifacts/macos/Embracedata_Downloader-macos
            artifacts/windows/Embracedata_Downloader-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}